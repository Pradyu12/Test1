<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Hanuman Sports</title>
    <meta name="theme-color" content="#00F0FF">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="logo.png" sizes="192x192">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00F0FF;
            --primary-light: rgba(0, 240, 255, 0.12);
            --secondary: #0A0E17;
            --accent: #00F0FF;
            --light: #F8F9FA;
            --dark: #212529;
            --white: #FFFFFF;
            --gray: #6C757D;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --neon-shadow: 0 0 12px rgba(0, 240, 255, 0.8);
            --primary-shadow: 0 0 18px rgba(0, 240, 255, 0.6);
            --warning: #FF4D4D;
            --warning-glow: rgba(255, 77, 77, 0.6);
            --success: #00F0FF;
            --success-glow: rgba(0, 240, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--secondary);
            color: var(--light);
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(10, 14, 23, 0.9), rgba(10, 14, 23, 0.9)),
                url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        .register-container {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 3rem;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            position: relative;
            margin: 2rem;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo img {
            height: 80px;
            filter: drop-shadow(0 0 5px var(--primary));
        }

        .logo h1 {
            font-size: 2rem;
            color: var(--white);
            background: linear-gradient(to right, #ffffff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            font-size: 0.9rem;
            color: var(--gray);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .full-width {
            grid-column: span 2;
        }

        .form-group {
            position: relative;
            width: 100%;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--accent);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            padding-right: 2.5rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        .form-group i {
            position: absolute;
            right: 1rem;
            top: 70%;
            transform: translateY(-50%);
            color: var(--gray);
        }

        .toggle-password {
            cursor: pointer;
            transition: color 0.3s;
            pointer-events: all;
        }

        .toggle-password:hover {
            color: var(--accent);
        }

        .password-checklist {
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        .password-checklist p {
            margin: 2px 0;
            color: var(--gray);
            transition: all 0.3s ease;
        }

        .password-checklist p.invalid { color: #FF4D4D; }
        .password-checklist p.valid { color: #00F0FF; text-shadow: 0 0 6px rgba(0, 240, 255, 0.7); }

        .btn {
            width: 100%;
            padding: 1rem;
            border-radius: 30px;
            border: 1px solid var(--primary);
            background: rgba(0, 240, 255, 0.15);
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(6px);
        }

        .btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.8);
            transform: translateY(-3px);
        }

        .login-link { text-align: center; margin-top: 2rem; color: var(--gray); }
        .login-link a { color: var(--accent); text-decoration: none; }

        .success-message {
            display: none;
            background: rgba(0, 240, 255, 0.15);
            border: 1px solid rgba(0, 240, 255, 0.5);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--accent);
            text-align: center;
        }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
            .password-checklist { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
    <div class="register-container">
        <div class="logo">
            <img src="logo.png" alt="Hanuman Sports Logo">
            <h1>Hanuman Sports</h1>
            <p>Mysore's Premier Sports Destination</p>
        </div>

        <div class="success-message" id="successMessage">
            <i class="fas fa-check-circle" style="font-size: 2rem; margin-bottom: 1rem; display: block;"></i>
            <h3>Registration Successful!</h3>
            <p>Your account has been created.<br>Redirecting you to login…</p>
        </div>

        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <div class="input-wrapper">
                        <input type="text" id="firstName" name="firstname" required>
                        <i class="fas fa-user"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <div class="input-wrapper">
                        <input type="text" id="lastName" name="lastname" required>
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group full-width">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" required>
                        <i class="fas fa-eye toggle-password"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" required>
                        <i class="fas fa-eye toggle-password"></i>
                    </div>
                </div>
            </div>

            <div class="password-checklist">
                <p id="rule-length">❌ At least 6 characters</p>
                <p id="rule-uppercase">❌ One uppercase letter</p>
                <p id="rule-number">❌ One number</p>
                <p id="rule-special">❌ One special character</p>
            </div>

            <div class="form-row">
                <div class="form-group full-width">
                    <label>Phone Number</label>
                    <div class="input-wrapper">
                        <input type="tel" id="phone" name="phone" required>
                        <i class="fas fa-phone"></i>
                    </div>
                </div>
            </div>

            <div class="terms">
                <input type="checkbox" id="agreeTerms" required>
                <label for="agreeTerms">I agree to the <a href="terms.html">Terms</a> & <a href="privacy.html">Privacy</a></label>
            </div>

            <button type="submit" class="btn" style="margin-top: 1.5rem;">Create Account</button>

            <div class="login-link">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const registerForm = document.getElementById("registerForm");
            const successMsg = document.getElementById("successMessage");

            // 1. Password Visibility Toggle
            document.querySelectorAll('.toggle-password').forEach(toggle => {
                toggle.onclick = function () {
                    const input = this.closest('.input-wrapper').querySelector('input');
                    if (input) {
                        input.type = input.type === 'password' ? 'text' : 'password';
                        this.classList.toggle('fa-eye');
                        this.classList.toggle('fa-eye-slash');
                    }
                };
            });

            // 2. Form Submission
            registerForm.onsubmit = async function (e) {
                e.preventDefault();

                const fName = document.getElementById('firstName')?.value || "";
                const lName = document.getElementById('lastName')?.value || "";
                const email = document.getElementById('email')?.value || "";
                const phone = document.getElementById('phone')?.value || "";
                const pass = document.getElementById('password')?.value || "";
                const confirmPass = document.getElementById('confirmPassword')?.value || "";

                if (pass !== confirmPass) {
                    if (window.toastInfo) toastInfo('Notice', 'Passwords do not match!');
                    else alert('Passwords do not match!');
                    return;
                }

                try {
                    const response = await fetch('http://localhost:3000/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: `${fName} ${lName}`.trim(),
                            email,
                            password: pass,
                            phone
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        registerForm.style.display = 'none';
                        successMsg.style.display = 'block';
                        setTimeout(() => { window.location.href = "login.html"; }, 2500);
                    } else {
                        if (window.toastError) toastError('Notice', 'Server says: ' + (data.message || 'Registration failed'));
                        else alert(data.message || 'Registration failed');
                    }
                } catch (error) {
                    console.error("Network Error:", error);
                    const errorMsg = 'Connection Refused. Ensure your backend server is running!';
                    if (window.toastInfo) toastInfo('Notice', errorMsg);
                    else alert(errorMsg);
                }
            };

            // 3. Password Real-time Validation
            const passwordInput = document.getElementById("password");
            const rules = {
                length: { el: document.getElementById("rule-length"), regex: /.{6,}/, text: "At least 6 characters" },
                upper: { el: document.getElementById("rule-uppercase"), regex: /[A-Z]/, text: "One uppercase letter" },
                number: { el: document.getElementById("rule-number"), regex: /[0-9]/, text: "One number" },
                special: { el: document.getElementById("rule-special"), regex: /[^A-Za-z0-9]/, text: "One special character" }
            };

            passwordInput.addEventListener("input", () => {
                const val = passwordInput.value;
                Object.values(rules).forEach(rule => {
                    const isValid = rule.regex.test(val);
                    rule.el.classList.toggle("valid", isValid);
                    rule.el.classList.toggle("invalid", !isValid);
                    rule.el.textContent = (isValid ? "✔ " : "❌ ") + rule.text;
                });
            });
        });
    </script>
    <script src="hs-utils.js"></script>
</body>
</html>
